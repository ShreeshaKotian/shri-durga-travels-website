<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        /* Hero section style */
        .hero {
            background: linear-gradient(to right, rgba(255, 182, 193, 0.8), rgba(255, 105, 180, 0.8));
            padding: 50px;
            text-align: center;
        }
    </style>
    <title>Shri Durga Travels</title>
</head>
<body>
    <div class="hero">
        <h1>Travel the World with Us!</h1>
        <p>Your journey begins here. "Traveling – it leaves you speechless, then turns you into a storyteller." – Ibn Battuta</p>
    </div>
    
    <h2>Booking Form</h2>
    <form action="https://formspree.io/f/YOUR_FORM_ID" method="POST">
        <input type="email" name="email" placeholder="Your email" required>
        <textarea name="message" placeholder="Your message" required></textarea>
        <button type="submit">Send</button>
    </form>
    
    <h2>Our Fleet</h2>
    <ul>
        <li>
            <h3>Toyota Innova</h3>
            <img src="path/to/toyota-innova.jpg" alt="Toyota Innova">
        </li>
        <li>
            <h3>Suzuki Swift Dzire</h3>
            <img src="path/to/suzuki-swift-dzire.jpg" alt="Suzuki Swift Dzire">
        </li>
        <li>
            <h3>Force Tempo Traveller</h3>
            <img src="path/to/force-tempo-traveller.jpg" alt="Force Tempo Traveller">
        </li>
        <li>
            <h3>Force Urbania</h3>
            <img src="path/to/force-urbania.jpg" alt="Force Urbania">
        </li>
    </ul>
</body>
</html>
