<!-- Booking Form -->
<section id="booking" class="p-10">
  <h2 class="text-2xl font-bold text-center mb-6">Smart Booking System</h2>

  <div class="max-w-lg mx-auto bg-white p-6 rounded shadow">

    <input id="name" type="text" placeholder="Your Name" class="w-full mb-3 p-2 border rounded">
    <input id="phone" type="text" placeholder="Phone Number" class="w-full mb-3 p-2 border rounded">
    <input id="pickup" type="text" placeholder="Pickup Location" class="w-full mb-3 p-2 border rounded">
    <input id="drop" type="text" placeholder="Drop Location" class="w-full mb-3 p-2 border rounded">

    <input id="date" type="date" class="w-full mb-3 p-2 border rounded">

    <!-- Trip Type -->
    <select id="tripType" class="w-full mb-3 p-2 border rounded">
      <option>One Way</option>
      <option>Round Trip</option>
    </select>

    <!-- Travellers -->
    <input id="adults" type="number" placeholder="No. of Adults" class="w-full mb-3 p-2 border rounded">
    <input id="children" type="number" placeholder="No. of Children" class="w-full mb-3 p-2 border rounded">

    <!-- Distance -->
    <input id="distance" type="number" placeholder="Approx Distance (km)" class="w-full mb-3 p-2 border rounded">

    <!-- Auto Vehicle Suggestion -->
    <p id="suggestion" class="mb-3 text-blue-600 font-semibold"></p>

    <!-- Fare -->
    <p id="fare" class="mb-3 text-green-600 font-bold"></p>

    <button onclick="calculateTrip()" 
      class="w-full bg-blue-600 text-white p-3 rounded mb-2">
      Calculate Fare
    </button>

    <button onclick="sendToWhatsApp()" 
      class="w-full bg-green-500 text-white p-3 rounded text-lg">
      Book via WhatsApp
    </button>

  </div>
</section>

<script>
function calculateTrip() {
  let adults = parseInt(document.getElementById("adults").value) || 0;
  let children = parseInt(document.getElementById("children").value) || 0;
  let total = adults + children;
  let distance = parseInt(document.getElementById("distance").value) || 0;
  let tripType = document.getElementById("tripType").value;

  let vehicle = "";
  let rate = 0;

  // Vehicle Suggestion Logic
  if (total <= 4) {
    vehicle = "Swift Dzire";
    rate = 12;
  } else if (total <= 7) {
    vehicle = "Innova";
    rate = 16;
  } else {
    vehicle = "Tempo Traveller";
    rate = 22;
  }

  document.getElementById("suggestion").innerText =
    "Recommended Vehicle: " + vehicle;

  // Fare Calculation
  let totalDistance = tripType === "Round Trip" ? distance * 2 : distance;
  let fare = totalDistance * rate;

  document.getElementById("fare").innerText =
    "Estimated Fare: ₹" + fare;
}

function sendToWhatsApp() {
  let name = document.getElementById("name").value;
  let phone = document.getElementById("phone").value;
  let pickup = document.getElementById("pickup").value;
  let drop = document.getElementById("drop").value;
  let date = document.getElementById("date").value;
  let tripType = document.getElementById("tripType").value;
  let adults = document.getElementById("adults").value;
  let children = document.getElementById("children").value;
  let distance = document.getElementById("distance").value;
  let suggestion = document.getElementById("suggestion").innerText;
  let fare = document.getElementById("fare").innerText;

  let message = `Hello Shri Durga Travels,

Booking Details:
Name: ${name}
Phone: ${phone}
Pickup: ${pickup}
Drop: ${drop}
Date: ${date}
Trip: ${tripType}

Travellers:
Adults: ${adults}
Children: ${children}

Distance: ${distance} km
${suggestion}
${fare}`;

  let url = "https://wa.me/919108842293?text=" + encodeURIComponent(message);
  window.open(url, "_blank");
}
</script>
